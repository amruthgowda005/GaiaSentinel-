<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #02050A; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; }
  #hud {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #FFC107; font-family: monospace; font-size: 12px; font-weight: bold;
    border: 1px solid #FFC107; padding: 8px 20px; border-radius: 20px;
    background: rgba(255,193,7,0.05); letter-spacing: 1px; pointer-events: none;
  }
  #sync {
    position: absolute; top: 16px; right: 16px;
    color: #8A99B5; font-family: monospace; font-size: 11px;
    border: 1px solid #1A233A; padding: 6px 14px; border-radius: 20px;
    background: rgba(26,35,58,0.5);
  }
  #label {
    position: absolute; top: 16px; left: 16px;
    color: #00E5FF; font-family: monospace; font-size: 12px; font-weight: bold;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div id="label">CORE:COMMAND — LIVE FEED</div>
<div id="sync">Sync: 0.002ms</div>
<div id="hud">⚡ Urban Pulse Active</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 2.5;

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // Stars
  const starGeo = new THREE.BufferGeometry();
  const starCount = 8000;
  const positions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount * 3; i++) positions[i] = (Math.random() - 0.5) * 100;
  starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.05 }));
  scene.add(stars);

  // Earth
  const earthGeo = new THREE.SphereGeometry(1, 64, 64);
  const loader = new THREE.TextureLoader();

  // Use public NASA Blue Marble texture via cors-friendly CDN
  const earthMat = new THREE.MeshPhongMaterial({
    map: loader.load('https://raw.githubusercontent.com/turban/webgl-earth/master/images/2_no_clouds_4k.jpg'),
    specularMap: loader.load('https://raw.githubusercontent.com/turban/webgl-earth/master/images/water_4k.png'),
    specular: new THREE.Color('#004488'),
    shininess: 15,
    bumpMap: loader.load('https://raw.githubusercontent.com/turban/webgl-earth/master/images/elev_bump_4k.jpg'),
    bumpScale: 0.05,
  });
  const earth = new THREE.Mesh(earthGeo, earthMat);
  scene.add(earth);

  // Clouds
  const cloudGeo = new THREE.SphereGeometry(1.01, 64, 64);
  const cloudMat = new THREE.MeshPhongMaterial({
    map: loader.load('https://raw.githubusercontent.com/turban/webgl-earth/master/images/fair_clouds_4k.png'),
    transparent: true, opacity: 0.35,
  });
  const clouds = new THREE.Mesh(cloudGeo, cloudMat);
  scene.add(clouds);

  // Atmosphere glow
  const atmGeo = new THREE.SphereGeometry(1.08, 64, 64);
  const atmMat = new THREE.MeshPhongMaterial({
    color: 0x0044ff, transparent: true, opacity: 0.08, side: THREE.FrontSide,
  });
  scene.add(new THREE.Mesh(atmGeo, atmMat));

  // Outer glow ring
  const glowGeo = new THREE.SphereGeometry(1.15, 64, 64);
  const glowMat = new THREE.MeshPhongMaterial({
    color: 0x0022aa, transparent: true, opacity: 0.04, side: THREE.FrontSide,
  });
  scene.add(new THREE.Mesh(glowGeo, glowMat));

  // Ambient + directional light (sun)
  scene.add(new THREE.AmbientLight(0x111122, 0.8));
  const sun = new THREE.DirectionalLight(0xffffff, 1.1);
  sun.position.set(5, 3, 5);
  scene.add(sun);

  // Mouse drag to rotate
  let isDragging = false;
  let prevMouse = { x: 0, y: 0 };
  let rotVelocity = { x: 0, y: 0 };

  document.addEventListener('mousedown', e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
  document.addEventListener('mouseup', () => { isDragging = false; });
  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    rotVelocity.x = dy * 0.005;
    rotVelocity.y = dx * 0.005;
    prevMouse = { x: e.clientX, y: e.clientY };
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  function animate() {
    requestAnimationFrame(animate);

    if (isDragging) {
      earth.rotation.x += rotVelocity.x;
      earth.rotation.y += rotVelocity.y;
      clouds.rotation.x += rotVelocity.x;
      clouds.rotation.y += rotVelocity.y;
    } else {
      earth.rotation.y += 0.0015;
      clouds.rotation.y += 0.0018;
    }
    rotVelocity.x *= 0.9;
    rotVelocity.y *= 0.9;

    stars.rotation.y += 0.0001;
    renderer.render(scene, camera);
  }
  animate();
</script>
</body>
</html>
